<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Spatial Link Lost</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --accent: #3b82f6;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background: #000;
            color: #fff;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .video-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: -2;
            opacity: 0.6;
            filter: brightness(0.6) saturate(1.2) blur(5px);
        }

        .video-overlay {
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at center, transparent 0%, rgba(0, 0, 0, 0.8) 100%);
            z-index: -1;
        }

        .card-404 {
            background: var(--glass-bg);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            border: 1px solid var(--glass-border);
            padding: 60px 40px;
            border-radius: 40px;
            text-align: center;
            max-width: 450px;
            width: 90%;
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.5);
            animation: slideUp 1s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .error-code {
            font-size: 8rem;
            font-weight: 900;
            margin: 0;
            background: linear-gradient(to bottom, #fff, rgba(255,255,255,0.2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            line-height: 1;
            letter-spacing: -5px;
            position: relative;
        }

        .error-code::after {
            content: '404';
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            width: 100%;
            color: var(--accent);
            opacity: 0.2;
            filter: blur(20px);
            z-index: -1;
        }

        h2 {
            font-size: 1.5rem;
            margin: 20px 0 10px;
            font-weight: 700;
        }

        p {
            font-size: 0.95rem;
            color: rgba(255, 255, 255, 0.5);
            line-height: 1.6;
            margin-bottom: 30px;
        }

        .btn-home {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: #fff;
            color: #000;
            padding: 14px 28px;
            border-radius: 16px;
            text-decoration: none;
            font-weight: 700;
            font-size: 0.9rem;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
        }

        .btn-home:hover {
            transform: translateY(-4px) scale(1.05);
            box-shadow: 0 15px 30px rgba(255, 255, 255, 0.2);
            background: var(--accent);
            color: #fff;
        }

        .spatial-icon {
            font-size: 3rem;
            color: var(--accent);
            margin-bottom: 20px;
            filter: drop-shadow(0 0 10px rgba(59, 130, 246, 0.5));
            animation: float 4s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }
    </style>
</head>
<body>
    
    <video class="video-background" autoplay muted loop playsinline>
        <source src="https://r2.guns.lol/66f828e9-e90a-48ff-b46b-4f064893c5b7.mp4" type="video/mp4">
    </video>
    <div class="video-overlay"></div>

    <div class="card-404">
        <div class="spatial-icon">
            <i class="fas fa-satellite-dish"></i>
        </div>
        <h1 class="error-code">404</h1>
        <h2>Spatial Link Lost</h2>
        <p>The coordinate you are attempting to reach does not exist in the Cydia Elite spatial registry.</p>
        <a href="index.html" class="btn-home">
            <i class="fas fa-arrow-left"></i>
            Return to Portal
        </a>
    </div>

    <script>
        document.addEventListener('contextmenu', e => e.preventDefault());
    </script>
</body>
</html>
